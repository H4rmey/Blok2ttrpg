services:
  ability-builder:
    build: .
    container_name: ability-builder
    ports:
      - "4040:8080"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./docs:/app/docs
    environment:
      - ABILITY_BUILDER_CONFIG=/app/config/ability-builder.yaml
    restart: unless-stopped
    networks:
      - proxynet

networks:
  proxynet:
    external: true
    name: global_network
