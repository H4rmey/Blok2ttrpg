version: 1
profile_id: ability-builder
combat:
  actions:
    amount: 3
additional_enactment:
  build_cost: 1
  energy_cost: 1
  description: "Adding an additional Enactment beyond the first"
trait_categories:
  - general
  - offense
  - defense
option_sources:
  directions_all:
    - North
    - East
    - South
    - West
    - Up
    - Down
    - Any
  directions:
    - North
    - East
    - South
    - West
    - Up
    - Down
    - Any
  shift_directions:
    - UP
    - DOWN
  trigger_timings:
    - Start of Target Turn
    - End of Engager Turn
  aoe_trigger_timings:
    - Start of Target Turn
    - End of Engager Turn
  reaction_triggers:
    - Target moves away from engager
    - Target moves towards engager
    - Target moves past engager
    - Engager gets healed by target
    - Target damages engager
    - Target makes a trait check
    - Target starts casting an ability
    - Target ends their turn within range
    - Target enters interaction range
    - Target leaves interaction range
    - Target fails a validation
    - Target succeeds on a validation
    - Target becomes affected by an enactment
    - Engager takes damage
    - Engager gets targeted by an ability
    - Ally within range takes damage
    - Ally within range gets healed
    - A target is moved by an effect
    - A persistent effect triggers
    - A minion is summoned within range
  knockout_options:
    - None
    - Engager takes damage
    - Engager falls unconscious
    - Engager dies
    - Engager gets grabbed or restrained
    - Engager moves voluntarily
    - Engager is moved by another effect
    - Engager fails a validation
    - Engager uses another phase
    - Engager loses line of sight to target
    - Target moves out of range
    - Target falls unconscious
    - Target dies
    - Target succeeds on a counter roll
    - Phase duration expires
    - Engager runs out of energy
dice:
  damage:

    - "d4"
    - "d6"
    - "d8"
    - "d10"
    - "d12"
  generic:
    - "d6"
    - "d8"
    - "d10"
    - "d12"
validations:
  default_engagement_trait: "offensive"
  default_counter_count: 2
  engagement:
    modes:
      - id: trait
        description: "Offensive Trait by default"
        build_cost: 0
        energy_cost: 0
      - id: generic
        description: "Engage Roll is replaced by a Generic Roll (default 1d6)"
        build_cost: -2
        energy_cost: 0
      - id: other
        description: "Replace the Engagement Roll to any other Trait"
        build_cost: 3
        energy_cost: 1
      - id: previous
        description: "Use the result of another roll for this entry"
        build_cost: 3
        energy_cost: 1
  counter:
    types:
      - id: defense
        description: "Defensive Trait (default)"
        build_cost: 0
        energy_cost: 0
      - id: general
        description: "Replace one of the Counter Rolls to a General Trait"
        build_cost: 4
        energy_cost: 0
      - id: offense
        description: "Replace one of the Counter Rolls to an Offensive Trait"
        build_cost: 4
        energy_cost: 0
      - id: previous
        description: "Use the result of another roll as counter"
        build_cost: 3
        energy_cost: 1
    single_counter_cost:
      build_cost: 3
      energy_cost: 1
    tier_shifts:
      - id: counter_up
        description: "Shift Dice Tier of Generic Counter Roll UP"
        build_cost: 3
        energy_cost: 1
      - id: counter_down
        description: "Shift Dice Tier of Generic Counter Roll DOWN"
        build_cost: -2
        energy_cost: 0
      - id: engage_up
        description: "Shift Dice Tier of Generic Engagement Roll UP"
        build_cost: 3
        energy_cost: 1
      - id: engage_down
        description: "Shift Dice Tier of Generic Engagement Roll DOWN"
        build_cost: -2
        energy_cost: 0
  fields:
    - key: engage_mode
      label: "Engage Roll Type"
      type: dropdown
      default: trait
      options:
        - value: trait
          label: "Trait Roll"
        - value: generic
          label: "Generic Roll"
          cost:
            build_cost: -2
            energy_cost: 0
        - value: other
          label: "Another roll result"
          cost:
            build_cost: 3
            energy_cost: 1
        - value: previous
          label: "Use result of previous interaction"
          cost:
            build_cost: 3
            energy_cost: 1
    - key: engage_trait
      label: "Trait"
      type: dropdown
      options_source: traits_all
      visibility_when: engage_mode
      show_when: trait
    - key: engage_die
      label: "Generic Die"
      type: dropdown
      options_source: dice_generic
      default: d6
      visibility_when: engage_mode
      show_when: generic

    - key: engage_other
      label: "Other Roll Text"
      type: free_text
      visibility_when: engage_mode
      show_when: other
    - key: counter_trait
      label: "Counter Trait"
      type: solutions
      default_count: 2
      options_source: traits_all
      row_defaults:
        - value: "defense.Reflex"
        - value: "defense.Constitution"
      row_fields:
        - key: value
          label: "Counter Trait"
          type: dropdown
          options_source: traits_all


      per_item:
        increase:
          build_cost: 0
          energy_cost: 0
        decrease:
          build_cost: 3
          energy_cost: 1
