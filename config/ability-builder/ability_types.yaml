        label: "Has Item Dependency"
        type: checkbox
        cost:
          add_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: hp
        label: "Health Bonus"
        type: free_number
        default: 0
        min: 0
        max: 5
        step: 1
        per_step:
          increase:
            add_cost: 1
            energy_cost: 0
      - key: life
        label: "Extra Lifetime"
        type: free_number
        default: 0
        min: 0
        max: 5
        step: 1
        per_step:
          increase:
            add_cost: 1
            energy_cost: 1

  preparation:
    name: "Preparation"
    description: "Works like a Reaction but must be prepared with an action."
    base_energy: 3
    base_action: 2
    base_range: 1
    base_uses: 1
    range_cost:
      add_cost: 1
      energy_cost: 0
    uses_cost:
      add_cost: 4
      energy_cost: 1
    step_costs:
      action:
        increase:
          add_cost: -2
          energy_cost: 0
        decrease:
          add_cost: 1
          energy_cost: 4
      energy:
        increase:
          add_cost: -2
          energy_cost: 1
        decrease:
          add_cost: 3
          energy_cost: -1
    perks:
      - id: item_dependency
        description: "Has item dependency"
        add_cost: -1
        energy_cost: 0
    compatible_enactments:
      - Enact Damage
      - Enact Healing
      - Enact Movement
      - Enact Proficiency Shift
      - Enact Persistent Effect
    fields:
      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          add_cost: -1
