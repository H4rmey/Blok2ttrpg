ability_types:
  execution:
    name: "Execution"
    description: "Performed instantly during a character's turn."
    base_energy: 3
    base_action: 2
    fields:

      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          build_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: energy_steps
        label: "Energy +/-"
        type: free_number
        default: 0
        min: -2
        max: 2
        step: 1
        per_step:
          increase:
            build_cost: -2
            energy_cost: 1
          decrease:
            build_cost: 3
            energy_cost: -1
      - key: action_steps
        label: "Action +/-"
        type: free_number
        default: 0
        min: -1
        max: 1
        step: 1
        per_step:
          increase:
            build_cost: -2
            energy_cost: 0
          decrease:
            build_cost: 4
            energy_cost: 1

  reaction:
    name: "Reaction"
    description: "Triggered in response to an event or enemy action."
    base_energy: 3
    base_action: 0
    base_range: 1
    base_uses: 1
    fields:

      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          build_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: trigger
        label: "Trigger"
        type: dropdown
        # Per-trigger build costs come from the costed option source; no flat
        # field cost so the selected trigger's own cost is not double-counted.
        options_source: reaction_triggers
      - key: trigger_trait
        label: "Trigger Trait"
        type: dropdown
        options_source: traits_defense
        visibility_when: trigger
        show_when: "Target makes a trait check"
      - key: range
        label: "Range"
        type: free_number
        default: 1
        min: 1
        max: 6
        step: 1
        per_step:
          increase:
            build_cost: 1
            energy_cost: 0
      - key: uses
        label: "Uses"
        type: free_number
        default: 1
        min: 1
        max: 3
        step: 1
        per_step:
          increase:
            build_cost: 4
            energy_cost: 1

  phase:
    name: "Phase"
    description: "Requires setup or charging time before execution."
    base_energy: 3
    base_action: 2
    base_duration: 2
    base_reverse_duration: 2
    fields:

      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          build_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: phase_rounds
        label: "Phase Duration"
        type: free_number
        default: 2
        min: 2
        max: 5
        step: 1
        per_step:
          increase:
            build_cost: 2
            energy_cost: 1
      - key: reverse_rounds
        label: "Reverse Rounds"
        type: free_number
        default: 1
        min: 1
        max: 5
        step: 1
        per_step:
          increase:
            build_cost: 4
            energy_cost: 0
          decrease:
            build_cost: -4
            energy_cost: 0
      - key: all_req
        label: "All knockout requirements have to be met"
        type: checkbox
        cost:
          build_cost: 3
          energy_cost: 0
      - key: reverse_knockout
        label: "Knockout can be used on the reverse phase"
        type: checkbox
        cost:
          build_cost: 3
          energy_cost: 0
      - key: no_knockout
        label: "No knockout possible"
        type: checkbox
        cost:
          build_cost: 5
          energy_cost: 0
      - key: knockout
        label: "Knockout Requirements"
        type: solutions
        default_count: 1
        options_source: knockout_options
        row_fields:
          - key: value
            label: "Knockout"
            type: dropdown
            # Each knockout carries its own balanced build cost from the costed
            # option source, so no flat per_item cost is applied here.
            options_source: knockout_options

  minion:
    name: "Minion"
    description: "Summons entities that act independently."
    base_energy: 0
    base_health: 10
    base_lifetime: 3
    fields:

      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          build_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: hp
        label: "Health Bonus"
        type: free_number
        default: 0
        min: 0
        max: 5
        step: 1
        per_step:
          increase:
            build_cost: 1
            energy_cost: 0
      - key: life
        label: "Extra Lifetime"
        type: free_number
        default: 0
        min: 0
        max: 5
        step: 1
        per_step:
          increase:
            build_cost: 1
            energy_cost: 1

  preparation:
    name: "Preparation"
    description: "Works like a Reaction but must be prepared with an action."
    base_energy: 3
    base_action: 2
    base_range: 1
    base_uses: 1
    fields:

      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          build_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: trigger
        label: "Trigger"
        type: dropdown
        # Per-trigger build costs come from the costed option source; no flat
        # field cost so the selected trigger's own cost is not double-counted.
        options_source: reaction_triggers
      - key: trigger_trait
        label: "Trigger Trait"
        type: dropdown
        options_source: traits_defense
        visibility_when: trigger
        show_when: "Target makes a trait check"
      - key: range
        label: "Range"
        type: free_number
        default: 1
        min: 1
        max: 6
        step: 1
        per_step:
          increase:
            build_cost: 1
            energy_cost: 0
      - key: uses
        label: "Uses"
        type: free_number
        default: 1
        min: 1
        max: 3
        step: 1
        per_step:
          increase:
            build_cost: 4
            energy_cost: 1
      - key: action_steps
        label: "Action +/-"
        type: free_number
        default: 0
        min: -1
        max: 1
        step: 1
        per_step:
          increase:
            build_cost: -2
            energy_cost: 0
          decrease:
            build_cost: 1
            energy_cost: 4
      - key: energy_steps
        label: "Energy +/-"
        type: free_number
        default: 0
        min: -2
        max: 2
        step: 1
        per_step:
          increase:
            build_cost: -2
            energy_cost: 1
          decrease:
            build_cost: 3
            energy_cost: -1

  concentration:
    name: "Concentration"
    description: "An effect that persists over multiple rounds as long as the Engager maintains focus."
    base_energy: 3
    base_action: 2
    base_upkeep_action: 1
    base_upkeep_energy: 1
    fields:

      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          build_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: energy_steps
        label: "Energy +/-"
        type: free_number
        default: 0
        min: -2
        max: 2
        step: 1
        per_step:
          increase:
            build_cost: -2
            energy_cost: 1
          decrease:
            build_cost: 3
            energy_cost: -1
      - key: effortless
        label: "Effortless (upkeep is free)"
        type: checkbox
        cost:
          build_cost: 3
          energy_cost: 0
      - key: iron_will
        label: "Iron Will (shift counter roll up on damage)"
        type: checkbox
        cost:
          build_cost: 2
          energy_cost: 0
      - key: dual_focus
        label: "Dual Focus (allow a second Concentration)"
        type: checkbox
        cost:
          build_cost: 5
          energy_cost: 0
