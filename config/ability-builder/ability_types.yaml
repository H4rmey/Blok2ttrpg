      - key: range
        label: "Range"
        type: free_number
        default: 1
        min: 1
        max: 6
        step: 1
        per_step:
          increase:
            add_cost: 1
            energy_cost: 0
      - key: uses
        label: "Uses"
        type: free_number
        default: 1
        min: 1
        max: 3
        step: 1
        per_step:
          increase:
            add_cost: 4
            energy_cost: 1
      - key: action_steps
        label: "Action +/-"
        type: free_number
        default: 0
        min: -1
        max: 1
        step: 1
        per_step:
          increase:
            add_cost: -2
            energy_cost: 0
          decrease:
            add_cost: 1
            energy_cost: 4
      - key: energy_steps
        label: "Energy +/-"
        type: free_number
        default: 0
        min: -2
        max: 2
        step: 1
        per_step:
          increase:
            add_cost: -2
            energy_cost: 1
          decrease:
            add_cost: 3
            energy_cost: -1

  concentration:
    name: "Concentration"
    description: "An effect that persists over multiple rounds as long as the Engager maintains focus."
    base_energy: 3
    base_action: 2
    base_upkeep_action: 1
    base_upkeep_energy: 1
    step_costs:
      energy:
        increase:
          add_cost: -2
          energy_cost: 1
        decrease:
          add_cost: 3
          energy_cost: -1
    perks:
      - id: effortless
        description: "Upkeep no longer costs an Action or Energy; it just requires focus."
        add_cost: 3
        energy_cost: 0
      - id: iron_will
        description: "When rolling to maintain Concentration after taking damage, you may shift your Counter Roll up one Dice Tier."
        add_cost: 2
        energy_cost: 0
      - id: dual_focus
        description: "You can have a second Concentration Ability active, but the upkeep for both doubles."
        add_cost: 5
        energy_cost: 0
      - id: item_dependency
        description: "Has item dependency"
        add_cost: -1
        energy_cost: 0
    compatible_enactments:
      - Enact Damage
      - Enact Healing
      - Enact Movement
      - Enact Proficiency Shift
      - Enact Persistent Effect
      - Enact State
    fields:
      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          add_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: energy_steps
        label: "Energy +/-"
        type: free_number
        default: 0
        min: -2
        max: 2
        step: 1
        per_step:
          increase:
            add_cost: -2
            energy_cost: 1
          decrease:
            add_cost: 3
            energy_cost: -1
      - key: effortless
        label: "Effortless (upkeep is free)"
        type: checkbox
        cost:
          add_cost: 3
          energy_cost: 0
      - key: iron_will
        label: "Iron Will (shift counter roll up on damage)"
        type: checkbox
        cost:
          add_cost: 2
          energy_cost: 0
      - key: dual_focus
        label: "Dual Focus (allow a second Concentration)"
        type: checkbox
        cost:
          add_cost: 5
          energy_cost: 0
