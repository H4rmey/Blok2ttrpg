ability_types:
  execution:
    name: "Execution"
    description: "Performed instantly during a character's turn."
    base_energy: 3
    base_action: 2
    step_costs:
      energy:
        increase:
          add_cost: -2
          energy_cost: 1
        decrease:
          add_cost: 3
          energy_cost: -1
      action:
        increase:
          add_cost: -2
          energy_cost: 0
        decrease:
          add_cost: 4
          energy_cost: 1
    perks:
      - id: item_dependency
        description: "Has item dependency"
        add_cost: -1
        energy_cost: 0
    compatible_enactments:
      - Enact Damage
      - Enact Healing
      - Enact Movement
      - Enact Proficiency Shift
      - Enact Persistent Effect
    fields:
      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          add_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: energy_steps
        label: "Energy +/-"
        type: free_number
        default: 0
        min: -2
        max: 2
        step: 1
        per_step:
          increase:
            add_cost: -2
            energy_cost: 1
          decrease:
            add_cost: 3
            energy_cost: -1
      - key: action_steps
        label: "Action +/-"
        type: free_number
        default: 0
        min: -1
        max: 1
        step: 1
        per_step:
          increase:
            add_cost: -2
            energy_cost: 0
          decrease:
            add_cost: 4
            energy_cost: 1

  reaction:
    name: "Reaction"
    description: "Triggered in response to an event or enemy action."
    base_energy: 3
    base_action: 0
    base_range: 1
    base_uses: 1
    range_cost:
      add_cost: 1
      energy_cost: 0
    uses_cost:
      add_cost: 4
      energy_cost: 1
    step_costs:
      energy:
        increase:
          add_cost: -2
          energy_cost: 1
        decrease:
          add_cost: 3
          energy_cost: -1
    perks:
      - id: item_dependency
        description: "Has item dependency"
        add_cost: -1
        energy_cost: 0
    triggers:
      - id: "Target moves away from engager"
        description: "Someone runs away from you"
        add_cost: 2
        energy_cost: 0
      - id: "Target moves towards engager"
        description: "Someone runs towards you"
        add_cost: 2
        energy_cost: 0
      - id: "Target moves past engager"
        description: "Someone moves past you"
        add_cost: 2
        energy_cost: 0
      - id: "Engager gets healed by target"
        description: "Someone gets healed"
        add_cost: 2
        energy_cost: 0
      - id: "Target damages engager"
        description: "Someone takes damage"
        add_cost: 2
        energy_cost: 0
      - id: "Target makes a trait check"
        description: "Someone does a skill check"
        add_cost: 2
        energy_cost: 0
      - id: "Target starts casting an ability"
        description: "Someone starts casting an ability"
        add_cost: 2
        energy_cost: 0
      - id: "Target ends their turn within range"
        description: "A turn ends within range"
        add_cost: 2
        energy_cost: 0
      - id: "Target enters interaction range"
        description: "Someone enters range"
        add_cost: 2
        energy_cost: 0
      - id: "Target leaves interaction range"
        description: "Someone leaves range"
        add_cost: 2
        energy_cost: 0
      - id: "Target fails a validation"
        description: "Someone fails a validation"
        add_cost: 2
        energy_cost: 0
      - id: "Target succeeds on a validation"
        description: "Someone succeeds on a validation"
        add_cost: 2
        energy_cost: 0
      - id: "Target becomes affected by an enactment"
        description: "Someone becomes affected by an enactment"
        add_cost: 2
        energy_cost: 0
      - id: "Engager takes damage"
        description: "You take damage"
        add_cost: 2
        energy_cost: 0
      - id: "Engager gets targeted by an ability"
        description: "You are targeted by an ability"
        add_cost: 2
        energy_cost: 0
      - id: "Ally within range takes damage"
        description: "An ally within range takes damage"
        add_cost: 2
        energy_cost: 0
      - id: "Ally within range gets healed"
        description: "An ally within range gets healed"
        add_cost: 2
        energy_cost: 0
      - id: "A target is moved by an effect"
        description: "Someone is moved by an effect"
        add_cost: 2
        energy_cost: 0
      - id: "A persistent effect triggers"
        description: "A persistent effect triggers"
        add_cost: 2
        energy_cost: 0
      - id: "A minion is summoned within range"
        description: "A minion is summoned within range"
        add_cost: 2
        energy_cost: 0
    compatible_enactments:
      - Enact Damage
      - Enact Healing
      - Enact Movement
      - Enact Proficiency Shift
      - Enact Persistent Effect
    fields:
      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          add_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: trigger
        label: "Trigger"
        type: dropdown
        options_source: reaction_triggers
        cost:
          add_cost: 2
          energy_cost: 0
      - key: trigger_trait
        label: "Trigger Trait"
        type: dropdown
        options_source: traits_defense
        visibility_when: trigger
        show_when: "Target makes a trait check"
      - key: range
        label: "Range"
        type: free_number
        default: 1
        min: 1
        max: 6
        step: 1
        per_step:
          increase:
            add_cost: 1
            energy_cost: 0
      - key: uses
        label: "Uses"
        type: free_number
        default: 1
        min: 1
        max: 3
        step: 1
        per_step:
          increase:
            add_cost: 4
            energy_cost: 1

  phase:
    name: "Phase"
    description: "Requires setup or charging time before execution."
    base_energy: 3
    base_action: 2
    base_duration: 2
    base_reverse_duration: 2
    duration_cost:
      add_cost: 2
      energy_cost: 1
    reverse_duration_refund:
      add_cost: 4
      energy_cost: 0
    perks:
      - id: all_knockouts_req
        description: "All knockout requirements have to be met"
        add_cost: 3
        energy_cost: 0
      - id: reverse_knockout
        description: "Knockout can be used on the reverse phase"
        add_cost: 3
        energy_cost: 0
      - id: no_knockout
        description: "No knockout possible"
        add_cost: 5
        energy_cost: 0
      - id: item_dependency
        description: "Has item dependency"
        add_cost: -1
        energy_cost: 0
    step_costs:
      energy:
        increase:
          add_cost: -2
          energy_cost: 1
        decrease:
          add_cost: 3
          energy_cost: -1
    knockout_requirements:
      - id: "None"
        description: "None"
        add_cost: 0
        energy_cost: 0
      - id: "Engager takes damage"
        description: "You take damage"
        add_cost: 0
        energy_cost: 0
      - id: "Engager falls unconscious"
        description: "You fall unconscious"
        add_cost: 0
        energy_cost: 0
      - id: "Engager dies"
        description: "You die"
        add_cost: 0
        energy_cost: 0
      - id: "Engager gets grabbed or restrained"
        description: "You get grabbed or restrained"
        add_cost: 0
        energy_cost: 0
      - id: "Engager moves voluntarily"
        description: "You move voluntarily"
        add_cost: 0
        energy_cost: 0
      - id: "Engager is moved by another effect"
        description: "You are moved by another effect"
        add_cost: 0
        energy_cost: 0
      - id: "Engager fails a validation"
        description: "You fail a validation"
        add_cost: 0
        energy_cost: 0
      - id: "Engager uses another phase"
        description: "You use another phase"
        add_cost: 0
        energy_cost: 0
      - id: "Engager loses line of sight to target"
        description: "You lose line of sight to target"
        add_cost: 0
        energy_cost: 0
      - id: "Target moves out of range"
        description: "Target moves out of range"
        add_cost: 0
        energy_cost: 0
      - id: "Target falls unconscious"
        description: "Target falls unconscious"
        add_cost: 0
        energy_cost: 0
      - id: "Target dies"
        description: "Target dies"
        add_cost: 0
        energy_cost: 0
      - id: "Target succeeds on a counter roll"
        description: "Target succeeds on a counter roll"
        add_cost: 0
        energy_cost: 0
      - id: "Phase duration expires"
        description: "Phase duration expires"
        add_cost: 0
        energy_cost: 0
      - id: "Engager runs out of energy"
        description: "You run out of energy"
        add_cost: 0
        energy_cost: 0
    compatible_enactments:
      - Enact Damage
      - Enact Healing
      - Enact Proficiency Shift
    bad_enactments:
      - id: reverse_default
        description: "Reverse of the original Enactment"
        add_cost: 0
        energy_cost: 0
    fields:
      - key: item_dep
        label: "Has Item Dependency"
        type: checkbox
        cost:
          add_cost: -1
          energy_cost: 0
      - key: item_name
        label: "Item Name"
        type: free_text
        visibility_when: item_dep
        show_when: "true"
      - key: phase_rounds
        label: "Phase Duration"
        type: free_number
        default: 2
        min: 2
        max: 5
        step: 1
        per_step:
          increase:
            add_cost: 2
            energy_cost: 1
      - key: reverse_rounds
        label: "Reverse Rounds"
        type: free_number
        default: 1
        min: 1
        max: 5
        step: 1
        per_step:
          increase:
            add_cost: 4
            energy_cost: 0
          decrease:
            add_cost: -4
            energy_cost: 0
      - key: all_req
        label: "All knockout requirements have to be met"
        type: checkbox
        cost:
          add_cost: 3
          energy_cost: 0
      - key: reverse_knockout
        label: "Knockout can be used on the reverse phase"
        type: checkbox
        cost:
          add_cost: 3
          energy_cost: 0
      - key: no_knockout
        label: "No knockout possible"
        type: checkbox
        cost:
          add_cost: 5
          energy_cost: 0
      - key: knockout
        label: "Knockout Requirements"
        type: solutions
        default_count: 1
        options_source: knockout_options
        row_fields:
          - key: value
            label: "Knockout"
            type: dropdown
            options_source: knockout_options
        per_item:
          increase:
            add_cost: -1
            energy_cost: 0
          decrease:
            add_cost: 0
            energy_cost: 0

  minion:
    name: "Minion"
    description: "Summons entities that act independently."
    base_energy: 0
    base_health: 10
    base_lifetime: 3
    health_bonus_cost:
      add_cost: 1
      energy_cost: 0
    lifetime_bonus_cost:
      add_cost: 1
      energy_cost: 1
    perks:
      - id: item_dependency
        description: "Has item dependency"
        add_cost: -1
        energy_cost: 0
    step_costs:
      energy:
        increase:
          add_cost: -2
          energy_cost: 1
        decrease:
          add_cost: 3
          energy_cost: -1
    compatible_enactments:
      - Enact Damage
      - Enact Healing
      - Enact Movement
      - Enact Proficiency Shift
      - Enact Persistent Effect
    fields:
