





<div class="enactment" data-index="0">
  <div class="enactment-head">
    <button type="button" class="collapse-toggle" aria-expanded="true">
      <span class="collapse-chevron">&#9660;</span>
      <strong>Enactment 0</strong>
    </button>
    <button type="button" class="btn small danger remove-enactment">Remove</button>
  </div>

  <div class="collapsible-content">
    <div class="region region-enactment">
      <h4 class="region-title">Enactment</h4>
      <div class="field">
        <label>Enactment Type</label>
        <select name="en0_type"
                hx-get="/builder/enactment"
                hx-target="closest .enactment"
                hx-swap="outerHTML"
                hx-include="closest .enactment"
                hx-vals='{"index": "0"}'>
          
          <option value="negation" selected>Enact Negation</option>
          
          <option value="damage" >Enact Damage</option>
          
          <option value="healing" >Enact Healing</option>
          
          <option value="movement" >Enact Movement</option>
          
          <option value="proficiency_shift" >Enact Proficiency Shift</option>
          
          <option value="persistent_effect" >Enact Persistent Effect</option>
          
          <option value="state" >Enact State</option>
          
        </select>
      </div>
      
      
        
        





<div class="field field-checkbox"
     data-field-key="always"
     >
  <label>Will always resolve
    
    <span class="cost-hint">(&#43;5 pt, &#43;3 E)</span>
    
  </label>

  
  <input type="checkbox" name="en0_f_always" >
  
  
</div>

    <option value="other" >Another roll result (&#43;3 pt, &#43;1 E)</option>

</div>

        
        





<div class="field field-dropdown"
