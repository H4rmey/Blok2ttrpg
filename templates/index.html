{{ template "head" . }}
<h1>Characters</h1>
<div class="toolbar">
  <a class="btn" href="/characters/new">+ New Character</a>
  <button class="btn" type="button" onclick="document.getElementById('character-import-input').click()">Import YAML</button>
  <form id="character-import-form" action="/characters/import" method="post" enctype="multipart/form-data" hidden>
    <input id="character-import-input" type="file" name="file" accept=".yaml,.yml" onchange="this.form.submit()">
  </form>

</div>

{{ if .Characters }}
<ul class="card-grid">
  {{ range .Characters }}
  <li class="card">
    <a href="/characters/{{ .ID }}"><strong>{{ .Name }}</strong></a>
    <span class="muted">Level {{ .Level }} &middot; {{ len .Abilities }} abilities</span>
  </li>
  {{ end }}
</ul>
{{ else }}
<p class="muted">No characters yet. Create one to get started.</p>
{{ end }}
{{ template "foot" . }}
