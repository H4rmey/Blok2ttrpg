{{define "title"}}Review Ability{{end}}

{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-bold text-white">
            {{if .IsDetail}}Ability Detail{{else}}Review Ability{{end}}
        </h1>
        <div class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-center">
            <span class="text-xs text-gray-400 block">Total Cost</span>
            <span class="text-2xl font-bold text-indigo-400">{{.TotalCost}}</span>
        </div>
    </div>

    <!-- YAML Output -->
    <section class="bg-gray-800 rounded-lg border border-gray-700 p-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-indigo-400">YAML Output</h2>
            <button onclick="navigator.clipboard.writeText(document.getElementById('yaml-output').textContent)"
                    class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-sm transition">
                Copy to Clipboard
            </button>
        </div>
        <pre id="yaml-output" class="bg-gray-900 rounded-lg p-4 text-sm text-green-400 font-mono overflow-x-auto whitespace-pre">{{.YAML}}</pre>
    </section>

    <!-- Actions -->
    <div class="flex items-center gap-4">
        {{if .IsDetail}}
        <a href="/characters/{{.CharacterID}}/abilities"
           class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm transition">
            ← Back to Abilities
        </a>
        <a href="/characters/{{.CharacterID}}/abilities/{{.Ability.ID}}/export"
           class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
            Download YAML
        </a>
        {{else}}
        <form method="POST" action="/ability/save" class="inline">
            <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-lg font-medium transition">
                Save Ability
            </button>
        </form>
        <a href="/characters/{{.CharacterID}}/abilities/new"
           class="text-gray-400 hover:text-white transition">← Back to Builder</a>
        {{end}}
    </div>
</div>
{{end}}
