{{define "points_bar.html"}}
<section id="points-bar" class="bg-gray-800 rounded-lg border border-gray-700 p-4 sticky top-16 z-40 shadow-lg">
    <div class="flex items-center justify-around flex-wrap gap-4 text-center">
        <div class="flex items-center gap-2">
            <span class="text-xs uppercase text-gray-400">Level</span>
            <input type="number" name="level" value="{{.Character.Level}}" min="1" max="{{.MaxLevel}}"
                   {{if not .IsNew}}hx-post="/characters/{{.Character.ID}}" hx-trigger="change" hx-target="#points-bar" hx-swap="outerHTML"{{end}}
                   class="w-16 bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white text-center focus:border-indigo-500 focus:outline-none">
        </div>
        <div>
            <span class="text-xs uppercase text-gray-400 block">Trait Points</span>
            <span id="trait-points-display" class="text-2xl font-bold {{if lt .TraitPointsRemaining 0}}text-red-400{{else}}text-green-400{{end}}"><span id="trait-points-used">{{.TraitPointsRemaining}}</span>/<span id="trait-points-budget">{{.TraitPointsBudget}}</span></span>
            <span id="trait-points-warning" {{if not (gt .TraitPointsUsed .TraitPointsBudget)}}style="display:none"{{end}} class="text-red-400 text-sm font-medium block">Over budget</span>
        </div>
        <div>
            <span class="text-xs uppercase text-gray-400 block">Ability Points</span>
            <span id="ability-points-display" data-spent="{{.AbilityPointsUsed}}" class="text-2xl font-bold {{if lt .AbilityPointsRemaining 0}}text-red-400{{else}}text-green-400{{end}}"><span id="ability-points-used">{{.AbilityPointsRemaining}}</span>/<span id="ability-points-budget">{{.AbilityPointsBudget}}</span></span>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1">
                <span class="text-xs uppercase text-gray-400">HP</span>
                <input type="number" id="current-hp" name="current_hp" value="{{.Character.CurrentHP}}" min="0" max="{{.CharacterHP}}"
                       class="w-14 bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white text-center text-sm focus:border-indigo-500 focus:outline-none">
                <span class="text-gray-400 text-sm">/</span>
                <span id="total-hp" class="text-white text-sm font-semibold">{{.CharacterHP}}</span>
            </div>
            <div class="flex items-center gap-1">
                <span class="text-xs uppercase text-gray-400">Move</span>
                <input type="text" id="total-movement" value="{{.CharacterMovement}}" readonly class="w-12 bg-gray-900 border border-gray-700 rounded px-2 py-1 text-white text-center text-sm">
            </div>
            <div class="flex items-center gap-1">
                <span class="text-xs uppercase text-gray-400">Energy</span>
                <input type="number" id="current-energy" name="current_energy" value="{{.Character.CurrentEnergy}}" min="0" max="{{.CharacterEnergy}}"
                       class="w-14 bg-gray-700 border border-gray-600 rounded px-2 py-1 text-white text-center text-sm focus:border-indigo-500 focus:outline-none">
                <span class="text-gray-400 text-sm">/</span>
                <span id="total-energy" class="text-white text-sm font-semibold">{{.CharacterEnergy}}</span>
            </div>
        </div>
    </div>
</section>
{{end}}
