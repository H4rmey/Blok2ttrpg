{{ define "head" }}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/htmx.min.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">{{ .Cfg.Title }}</a>
    <nav>
      <a href="/docs">Docs</a>
      <button id="theme-toggle" type="button" title="Toggle theme">&#9788;</button>
    </nav>
  </header>
  {{ if .Breadcrumbs }}
  <nav class="breadcrumbs">
    {{ range $i, $c := .Breadcrumbs }}{{ if $i }} <span class="sep">/</span> {{ end }}<a href="{{ $c.URL }}">{{ $c.Label }}</a>{{ end }}
  </nav>
  {{ end }}
  <main class="content">
{{ end }}

{{ define "foot" }}
  </main>
  <script src="/static/js/app.js?v=5"></script>
</body>
</html>
{{ end }}
