{{ define "docs.html" }}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/htmx.min.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">Home</a>
    <nav>
      <a href="/docs/markdown">Download Markdown</a>
      <button type="button" class="btn" onclick="window.print()">Print / Save PDF</button>
      <button id="theme-toggle" type="button" title="Toggle theme">&#9788;</button>
    </nav>
  </header>
  <main class="content docs">
    {{ .Content }}
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
{{ end }}
