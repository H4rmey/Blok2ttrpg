# Shield (D&D Reaction spell)
ability:
  type: Reaction
  name: Shield
  description: An invisible barrier of magical force protects you.
  trigger: Someone targets you with an attack
  enactments:
    - type: Enact Proficiency Shift
      shifted_trait: Reflex
      shift_dir: UP
      shift_amount: 2
      interactions:
        - type: Self
