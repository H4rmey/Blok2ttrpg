# Vampiric Touch / Life Steal (D&D necromancy)
ability:
  type: Execution
  name: Life Steal
  description: You drain life from target and heal yourself.
  enactments:
    - type: Enact Damage
      source: d6
      interactions:
        - type: Direct
          range: 1m
    - type: Enact Healing
      source: previous
      interactions:
        - type: Self
