<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blok2ttrpg Character Sheet</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        // Apply saved theme before page renders to avoid flash
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors" hx-boost="true">
    <header class="bg-gray-100 dark:bg-gray-800 border-b border-gray-300 dark:border-gray-700 px-6 py-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold text-amber-600 dark:text-amber-400">Blok2ttrpg</h1>
                <button onclick="toggleTheme()" id="theme-toggle"
                    class="text-gray-900 dark:text-gray-100 hover:text-amber-600 dark:hover:text-amber-400 p-1.5 rounded-lg border border-gray-400 dark:border-gray-500 bg-gray-200 dark:bg-gray-700"
                    title="Toggle light/dark theme">
                    <svg id="theme-icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg id="theme-icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
            </div>
            {{template "level_controls" .}}
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <nav class="flex border-b border-gray-300 dark:border-gray-700 mb-6" id="tab-nav">
            <button
                class="tab-btn px-4 py-2 text-sm font-medium text-amber-600 dark:text-amber-400 border-b-2 border-amber-600 dark:border-amber-400"
                hx-get="/tabs/attributes"
                hx-target="#tab-content"
                hx-swap="innerHTML"
                onclick="setActiveTab(this)"
            >
                Character Attributes
            </button>
            <button
                class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200"
                hx-get="/tabs/general-traits"
                hx-target="#tab-content"
                hx-swap="innerHTML"
                onclick="setActiveTab(this)"
            >
                General Traits
            </button>
            <button
                class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200"
                hx-get="/tabs/combative-traits"
                hx-target="#tab-content"
                hx-swap="innerHTML"
                onclick="setActiveTab(this)"
            >
                Combative Traits
            </button>
            <button
                class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200"
                hx-get="/tabs/abilities"
                hx-target="#tab-content"
                hx-swap="innerHTML"
                onclick="setActiveTab(this)"
            >
                Ability Builder
            </button>
        </nav>

        <!-- Character Actions -->
        <div class="flex items-center justify-end gap-2 mb-4 -mt-4">
            <a href="/character/export" hx-boost="false"
               class="text-xs text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-3 py-1 rounded border border-gray-300 dark:border-gray-700 hover:border-gray-500">
                Export Character
            </a>
            <form hx-post="/character/import"
                  hx-encoding="multipart/form-data"
                  hx-swap="none"
                  class="inline-flex items-center gap-1">
                <input type="file" name="character_file" accept=".yaml,.yml" required
                    class="hidden" id="import-char-file"
                    onchange="this.form.requestSubmit()">
                <label for="import-char-file"
                    class="text-xs text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-3 py-1 rounded border border-gray-300 dark:border-gray-700 hover:border-gray-500 cursor-pointer">
                    Import Character
                </label>
            </form>
            <button
                class="text-xs text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-3 py-1 rounded border border-gray-300 dark:border-gray-700 hover:border-gray-500"
                hx-post="/character/new"
                hx-swap="none"
                hx-confirm="Start a new character? All unsaved changes will be lost."
            >
                New Character
            </button>
        </div>

        <div id="tab-content">
            {{template "tab_attributes" .}}
        </div>
    </main>

    <footer class="text-center text-gray-500 dark:text-gray-600 text-xs py-4">
        Blok2ttrpg Character Sheet &mdash; Self-hosted TTRPG Tool
    </footer>

    <!-- Error Toast -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script>
        // Prevent page jump on HTMX swaps by saving/restoring scroll position
        var savedScrollY = 0;
        document.addEventListener('htmx:beforeRequest', function() {
            savedScrollY = window.scrollY;
        });
        document.addEventListener('htmx:afterSwap', function() {
            window.scrollTo(0, savedScrollY);
        });

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function setActiveTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('text-amber-600', 'dark:text-amber-400', 'border-b-2', 'border-amber-600', 'dark:border-amber-400');
                b.classList.add('text-gray-500', 'dark:text-gray-400');
            });
            btn.classList.remove('text-gray-500', 'dark:text-gray-400');
            btn.classList.add('text-amber-600', 'dark:text-amber-400', 'border-b-2', 'border-amber-600', 'dark:border-amber-400');
        }

        // Error toast notification
        document.body.addEventListener('showError', function(evt) {
            const msg = evt.detail.value || evt.detail;
            showToast(msg, 'error');
        });

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'px-4 py-3 rounded-lg shadow-lg text-sm max-w-sm animate-fade-in ' +
                (type === 'error' ? 'bg-red-900/90 text-red-200 border border-red-700' : 'bg-green-900/90 text-green-200 border border-green-700');
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // HTMX loading indicator
        document.body.addEventListener('htmx:beforeRequest', function() {
            document.body.classList.add('htmx-loading');
        });
        document.body.addEventListener('htmx:afterRequest', function() {
            document.body.classList.remove('htmx-loading');
        });
    </script>
</body>
</html>
