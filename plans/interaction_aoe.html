<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interaction Builder - Area of Effect</title>
</head>
<body>
  <h1>Interaction Builder - Area of Effect</h1>
  <p>Builder for Area of Effect interaction.</p>
<form id="builder"><fieldset><legend>Overview</legend><p><strong>Always Resolve:</strong> <output id="resolve">No</output> | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">0</output></p><p><strong>Final Interaction:</strong> <output id="formula">AoE, radius 1m, duration 2 rounds</output></p></fieldset><fieldset><legend>Builder</legend><p><label><input type="checkbox" name="always" /> Will always resolve</label></p><p><strong>Type =</strong> Area of Effect <strong> + </strong><label>Radius:</label><select name="radius"><option value="1">1m</option>
<option value="2">2m</option>
<option value="3">3m</option>
<option value="4">4m</option>
<option value="5">5m</option>
<option value="6">6m</option></select> <strong> + </strong><label>Range:</label><select name="range"><option value="0">0m</option>
<option value="1">1m</option>
<option value="2">2m</option>
<option value="3">3m</option>
<option value="4">4m</option>
<option value="5">5m</option>
<option value="6">6m</option>
<option value="7">7m</option>
<option value="8">8m</option>
<option value="9">9m</option>
<option value="10">10m</option></select> <strong> + </strong><label>Duration:</label><select name="duration"><option value="2">2 rounds</option>
<option value="3">3 rounds</option>
<option value="4">4 rounds</option>
<option value="5">5 rounds</option>
<option value="6">6 rounds</option></select></p><p><label>Trigger Timing:</label><select name="timing"><option value="Start of Engager Turn">At start of engager turn</option><option value="End of Engager Turn">At end of engager turn</option><option value="Start of Character Turn">At start of affected character turn</option><option value="Entering Area">When entering the area</option></select></p><p><label>Origin:</label><select name="origin_mode" id="origin-mode"><option value="engager">Engager</option><option value="other">Other Origin</option></select><span id="origin-wrap" hidden><input type="text" name="origin_text" placeholder="e.g. beacon, trap" /></span> <label><input type="checkbox" name="immune" /> Engager is immune</label></p></fieldset><fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset></form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>
<script>function calculate(){const f=document.getElementById('builder');let add=0,energy=0,lines=['Base AoE: radius 1m, range 0m, duration 2 rounds (add +0, energy +0)'];const radius=Number(f.radius.value),range=Number(f.range.value),duration=Number(f.duration.value);if(f.always.checked){add+=5;energy+=3;lines.unshift('Will always resolve (add +5, energy +3)');}if(radius>1){add+=(radius-1)*2;energy+=radius-1;lines.push('Increase radius (add +'+((radius-1)*2)+', energy +'+(radius-1)+')');}if(range>0){add+=Math.ceil(range/2);lines.push('Increase range (add +'+Math.ceil(range/2)+', energy +0)');}if(duration>2){add+=(duration-2)*2;energy+=duration-2;lines.push('Increase duration (add +'+((duration-2)*2)+', energy +'+(duration-2)+')');}let origin='Engager';if(f.origin_mode.value==='other'){origin=f.origin_text.value.trim()||'[other origin]';add+=2;energy+=1;lines.push('Change origin (add +2, energy +1)');}if(f.immune.checked){add+=2;lines.push('Engager is immune (add +2, energy +0)');}document.getElementById('origin-wrap').hidden=f.origin_mode.value!=='other';setText('resolve',f.always.checked?'Yes':'No');setText('build',add);setText('cast',energy);setText('formula','AoE, radius '+radius+'m, range '+range+'m, duration '+duration+' rounds, '+f.timing.value+', origin '+origin+(f.immune.checked?', engager immune':''));fillList('breakdown',lines);}document.getElementById('builder').addEventListener('input',calculate);document.getElementById('builder').addEventListener('change',calculate);calculate();</script>
</body>
</html>
