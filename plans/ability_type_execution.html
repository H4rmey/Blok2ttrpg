<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ability Type Builder - Execution</title>
</head>
<body>
  <h1>Ability Type Builder - Execution</h1>
  <p>Builder for Execution ability type.</p>
<form id="builder"><fieldset><legend>Overview</legend><p><strong>Type:</strong> Execution | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">3</output></p><p><strong>Final Type Summary:</strong> <output id="formula">Execution, 2 actions, 3 energy</output></p></fieldset><fieldset><legend>Builder</legend><p><label><input type="checkbox" name="item_dep" /> Has Item Dependency</label></p><p><label>Energy Adjustment:</label><select name="energy_steps"><option value="-2">-2</option><option value="-1">-1</option><option value="0" selected>0</option><option value="1">+1</option><option value="2">+2</option></select> <strong> + </strong><label>Action Adjustment:</label><select name="action_steps"><option value="-1">-1</option><option value="0" selected>0</option><option value="1">+1</option></select></p></fieldset><fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset></form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>
<script>function calculate(){const f=document.getElementById('builder');let add=0,energy=3,actions=2,lines=['Base execution: 2 actions, 3 energy (add +0, energy +3)'];if(f.item_dep.checked){add-=1;lines.push('Has item dependency (add -1, energy +0)');}const e=Number(f.energy_steps.value),a=Number(f.action_steps.value);if(e>0){add+=e*-2;energy+=e;lines.push('Increase energy cost (add '+(e*-2)+', energy +'+e+')');}if(e<0){add+=Math.abs(e)*3;energy+=e;lines.push('Reduce energy cost (add +'+(Math.abs(e)*3)+', energy '+e+')');}if(a>0){add+=a*-2;actions+=a;lines.push('Increase action cost (add '+(a*-2)+', energy +0)');}if(a<0){add+=Math.abs(a)*4;actions+=a;energy+=Math.abs(a);lines.push('Reduce action cost (add +'+(Math.abs(a)*4)+', energy +'+Math.abs(a)+')');}setText('build',add);setText('cast',energy);setText('formula','Execution, '+actions+' action(s), '+energy+' energy');fillList('breakdown',lines);}document.getElementById('builder').addEventListener('input',calculate);document.getElementById('builder').addEventListener('change',calculate);calculate();</script>
</body>
</html>
