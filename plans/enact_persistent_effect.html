<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enact Persistent Effect Builder</title>
</head>
<body>
  <h1>Enact Persistent Effect Builder</h1>
  <p>Builder for persistent effects with named enactment and removable solution options.</p>

<form id="builder">
  <fieldset><legend>Overview</legend><p><strong>Always Resolve:</strong> <output id="resolve">No</output> | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">2</output></p><p><strong>Final Effect:</strong> <output id="formula">Burning applies Enact Damage for 2 rounds</output></p></fieldset>
  <fieldset><legend>Builder</legend>
    <p><label>Name:</label><input type="text" name="effect_name" value="Burning" /></p>
    <p><label><input type="checkbox" name="always" /> Will always resolve</label></p>
    <p><label>Effect:</label><select name="effect"><option>Enact Damage</option><option>Enact Healing</option><option>Enact Movement</option><option>Enact Proficiency Shift</option></select> <strong> + </strong><label>Duration:</label><select name="duration"><option value="2">2 rounds</option>
<option value="3">3 rounds</option>
<option value="4">4 rounds</option>
<option value="5">5 rounds</option>
<option value="6">6 rounds</option>
<option value="7">7 rounds</option>
<option value="8">8 rounds</option></select> <strong> + </strong><label>Trigger:</label><select name="trigger"><option>Start of Target Turn</option><option>End of Engager Turn</option></select></p>
    <p><strong>Solutions:</strong></p><div id="solutions"></div><p><button type="button" id="add-solution">+ Solution</button> <button type="button" id="remove-solution">- Solution</button></p>
  </fieldset><fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset>
</form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>

<script>
const traitOptions=['Strength', 'Dexterity', 'Stealth', 'Perception', 'Nature', 'Crafting', 'People Skill', 'Performance', 'Thievery', 'Knowledge', 'Magic', 'Precision', 'Power', 'Mind', 'Reflex', 'Constitution'];
function solutionSelect(value='Dexterity'){const p=document.createElement('p');const s=document.createElement('select');s.name='solution';traitOptions.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;if(t===value)o.selected=true;s.appendChild(o);});p.appendChild(s);return p;}
function ensureSolution(){const host=document.getElementById('solutions');if(host.children.length===0)host.appendChild(solutionSelect());}
function calculate(){ensureSolution();const f=document.getElementById('builder');let add=0,energy=2,lines=['Base persistent effect (add +0, energy +2)'];if(f.always.checked){add+=5;energy+=3;lines.unshift('Will always resolve (add +5, energy +3)');}const duration=Number(f.duration.value||2);if(duration>2){add+=(duration-2)*2;energy+=duration-2;lines.push('Add more rounds (add +'+((duration-2)*2)+', energy +'+(duration-2)+')');}const solutions=[...document.querySelectorAll('select[name="solution"]')].map(s=>s.value);if(solutions.length===1){add+=3;energy+=1;lines.push('Remove one solution option (add +3, energy +1)');}if(solutions.length>2){lines.push('Extra solution options are currently free in this prototype');}setText('resolve',f.always.checked?'Yes':'No');setText('build',add);setText('cast',energy);setText('formula',(f.effect_name.value.trim()||'[name]')+' applies '+f.effect.value+' for '+duration+' rounds, trigger: '+f.trigger.value+', solutions: '+solutions.join(' or '));fillList('breakdown',lines);}
document.getElementById('add-solution').onclick=()=>{document.getElementById('solutions').appendChild(solutionSelect());calculate();};
document.getElementById('remove-solution').onclick=()=>{const host=document.getElementById('solutions');if(host.children.length>1)host.removeChild(host.lastElementChild);calculate();};
document.getElementById('builder').addEventListener('input',calculate);document.getElementById('builder').addEventListener('change',calculate);document.getElementById('solutions').appendChild(solutionSelect('Dexterity'));document.getElementById('solutions').appendChild(solutionSelect('Constitution'));calculate();
</script>
</body>
</html>
