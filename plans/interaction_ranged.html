<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interaction Builder - Ranged</title>
</head>
<body>
  <h1>Interaction Builder - Ranged</h1>
  <p>Builder for Ranged interaction.</p>
<form id="builder"><fieldset><legend>Overview</legend><p><strong>Always Resolve:</strong> <output id="resolve">No</output> | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">0</output></p><p><strong>Final Interaction:</strong> <output id="formula">Ranged, 1 target, range 10m</output></p></fieldset><fieldset><legend>Builder</legend><p><label><input type="checkbox" name="always" /> Will always resolve</label></p><p><strong>Type =</strong> Ranged <strong> + </strong><label>Range:</label><select name="range"><option value="10">10m</option>
<option value="11">11m</option>
<option value="12">12m</option>
<option value="13">13m</option>
<option value="14">14m</option>
<option value="15">15m</option>
<option value="16">16m</option>
<option value="17">17m</option>
<option value="18">18m</option>
<option value="19">19m</option>
<option value="20">20m</option></select> <strong> + </strong><label>Targets:</label><select name="targets"><option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option></select></p><p><label><input type="checkbox" name="visible" /> Target may be not visible</label> <label><input type="checkbox" name="obstructed" /> Target may be obstructed</label> <label><input type="checkbox" name="remove_penalty" /> Remove engagement penalty</label></p></fieldset><fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset></form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>
<script>function calculate(){const f=document.getElementById('builder');let add=0,energy=0,lines=['Base ranged: 1 target, 10m, engage -2 (add +0, energy +0)'];const r=Number(f.range.value),t=Number(f.targets.value);if(f.always.checked){add+=5;energy+=3;lines.unshift('Will always resolve (add +5, energy +3)');}if(r>10){const c=Math.floor((r-10)/2);add+=c;lines.push('Increase range (add +'+c+', energy +0)');}if(t>1){add+=(t-1)*3;energy+=(t-1)*2;lines.push('Add targets (add +'+((t-1)*3)+', energy +'+((t-1)*2)+')');}if(f.visible.checked){add+=3;energy+=1;lines.push('Target may be not visible (add +3, energy +1)');}if(f.obstructed.checked){add+=3;energy+=1;lines.push('Target may be obstructed (add +3, energy +1)');}if(f.remove_penalty.checked){add+=3;energy+=1;lines.push('Remove engagement penalty (add +3, energy +1)');}setText('resolve',f.always.checked?'Yes':'No');setText('build',add);setText('cast',energy);setText('formula','Ranged, '+t+' target(s), range '+r+'m');fillList('breakdown',lines);}document.getElementById('builder').addEventListener('input',calculate);document.getElementById('builder').addEventListener('change',calculate);calculate();</script>
</body>
</html>
