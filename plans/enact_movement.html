<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enact Movement Builder</title>
</head>
<body>
  <h1>Enact Movement Builder</h1>
  <p>Builder for movement with multiple direction options.</p>

<form id="builder">
  <fieldset><legend>Overview</legend><p><strong>Always Resolve:</strong> <output id="resolve">No</output> | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">0</output></p><p><strong>Final Movement:</strong> <output id="formula">Move target 1m Away from Engager</output></p></fieldset>
  <fieldset><legend>Builder</legend>
    <p><label><input type="checkbox" name="always" /> Will always resolve</label></p>
    <p><label>Origin:</label><select name="origin_mode" id="origin-mode"><option value="engager">Engager</option><option value="other">Other Origin</option></select><span id="origin-wrap" hidden><label>Origin Text:</label><input type="text" name="origin_text" placeholder="e.g. arrow, beacon" /></span></p>
    <p><strong>Move =</strong> <label>Distance:</label><select name="distance"><option value="1">1m</option>
<option value="2">2m</option>
<option value="3">3m</option>
<option value="4">4m</option>
<option value="5">5m</option>
<option value="6">6m</option>
<option value="7">7m</option>
<option value="8">8m</option>
<option value="9">9m</option>
<option value="10">10m</option></select> <strong> + Directions:</strong></p>
    <div id="directions"></div>
    <p><button type="button" id="add-direction">+ Direction</button> <button type="button" id="remove-direction">- Direction</button></p>
  </fieldset>
  <fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset>
</form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>

<script>
const directionOptions = ['Up', 'Down', 'Away', 'Towards', 'Forward', 'Left', 'Right', 'Free'];
function directionSelect(value='Away'){const select=document.createElement('select');select.name='direction';directionOptions.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;if(d===value)o.selected=true;select.appendChild(o);});const p=document.createElement('p');p.appendChild(select);return p;}
function ensureOneDirection(){const host=document.getElementById('directions');if(host.children.length===0)host.appendChild(directionSelect());}
function calculate(){ensureOneDirection();const f=document.getElementById('builder');let add=0,energy=0,lines=[];if(f.always.checked){add+=3;energy+=1;lines.push('Will always resolve (add +3, energy +1)');}const distance=Number(f.distance.value||1);if(distance>1){add+=distance-1;lines.push('Add '+(distance-1)+'m to movement (add +'+(distance-1)+', energy +0)');}let origin='Engager';if(f.origin_mode.value==='other'){origin=f.origin_text.value.trim()||'[other origin]';add+=2;energy+=1;lines.push('Change origin to something else (add +2, energy +1)');}else{lines.push('Base origin: Engager (add +0, energy +0)');}const dirs=[...document.querySelectorAll('select[name="direction"]')].map(s=>s.value);if(dirs.length>1){add+=(dirs.length-1);lines.push('Add '+(dirs.length-1)+' extra direction option(s) (add +'+(dirs.length-1)+', energy +0)');}const freeCount=dirs.filter(d=>d==='Free').length;if(freeCount>0){add+=freeCount*2;energy+=freeCount;lines.push('Free direction selected '+freeCount+' time(s) (add +'+(freeCount*2)+', energy +'+freeCount+')');}document.getElementById('origin-wrap').hidden=f.origin_mode.value!=='other';setText('resolve',f.always.checked?'Yes':'No');setText('build',add);setText('cast',energy);setText('formula','Move target '+distance+'m '+dirs.join(' or ')+' from '+origin);fillList('breakdown',lines);}
document.getElementById('add-direction').onclick=()=>{document.getElementById('directions').appendChild(directionSelect());calculate();};
document.getElementById('remove-direction').onclick=()=>{const host=document.getElementById('directions');if(host.children.length>1)host.removeChild(host.lastElementChild);calculate();};
document.getElementById('builder').addEventListener('input',calculate);document.getElementById('builder').addEventListener('change',calculate);ensureOneDirection();calculate();
</script>
</body>
</html>
