<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interaction Builder - Area</title>
</head>
<body>
  <h1>Interaction Builder - Area</h1>
  <p>Builder for Area interaction.</p>
<form id="builder"><fieldset><legend>Overview</legend><p><strong>Always Resolve:</strong> <output id="resolve">No</output> | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">0</output></p><p><strong>Final Interaction:</strong> <output id="formula">Area, radius 1m, range 0m</output></p></fieldset><fieldset><legend>Builder</legend><p><label><input type="checkbox" name="always" /> Will always resolve</label></p><p><strong>Type =</strong> Area <strong> + </strong><label>Radius:</label><select name="radius"><option value="1">1m</option>
<option value="2">2m</option>
<option value="3">3m</option>
<option value="4">4m</option>
<option value="5">5m</option>
<option value="6">6m</option></select> <strong> + </strong><label>Range:</label><select name="range"><option value="0">0m</option>
<option value="1">1m</option>
<option value="2">2m</option>
<option value="3">3m</option>
<option value="4">4m</option>
<option value="5">5m</option>
<option value="6">6m</option>
<option value="7">7m</option>
<option value="8">8m</option>
<option value="9">9m</option>
<option value="10">10m</option></select></p><p><label>Origin:</label><select name="origin_mode" id="origin-mode"><option value="engager">Engager</option><option value="other">Other Origin</option></select><span id="origin-wrap" hidden><input type="text" name="origin_text" placeholder="e.g. trap, beacon" /></span></p></fieldset><fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset></form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>
<script>function calculate(){const f=document.getElementById('builder');let add=0,energy=0,lines=['Base area: radius 1m, range 0m, origin Engager (add +0, energy +0)'];const radius=Number(f.radius.value),range=Number(f.range.value);if(f.always.checked){add+=5;energy+=3;lines.unshift('Will always resolve (add +5, energy +3)');}if(radius>1){add+=(radius-1)*2;energy+=radius-1;lines.push('Increase radius (add +'+((radius-1)*2)+', energy +'+(radius-1)+')');}if(range>0){add+=Math.ceil(range/2);lines.push('Increase range (add +'+Math.ceil(range/2)+', energy +0)');}let origin='Engager';if(f.origin_mode.value==='other'){origin=f.origin_text.value.trim()||'[other origin]';add+=2;energy+=1;lines.push('Change origin (add +2, energy +1)');}document.getElementById('origin-wrap').hidden=f.origin_mode.value!=='other';setText('resolve',f.always.checked?'Yes':'No');setText('build',add);setText('cast',energy);setText('formula','Area, radius '+radius+'m, range '+range+'m, origin '+origin);fillList('breakdown',lines);}document.getElementById('builder').addEventListener('input',calculate);document.getElementById('builder').addEventListener('change',calculate);calculate();</script>
</body>
</html>
