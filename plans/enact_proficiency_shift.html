<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enact Proficiency Shift Builder</title>
</head>
<body>
  <h1>Enact Proficiency Shift Builder</h1>
  <p>Builder for proficiency shifts.</p>

<form id="builder"><fieldset><legend>Overview</legend><p><strong>Always Resolve:</strong> <output id="resolve">No</output> | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">0</output></p><p><strong>Final Shift:</strong> <output id="formula">Shift Strength UP by 1 for 1 use</output></p></fieldset>
<fieldset><legend>Builder</legend><p><label><input type="checkbox" name="always" /> Will always resolve</label></p><p><label>Trait:</label><select name="trait"><option value="Strength">Strength</option>
<option value="Dexterity">Dexterity</option>
<option value="Stealth">Stealth</option>
<option value="Perception">Perception</option>
<option value="Nature">Nature</option>
<option value="Crafting">Crafting</option>
<option value="People Skill">People Skill</option>
<option value="Performance">Performance</option>
<option value="Thievery">Thievery</option>
<option value="Knowledge">Knowledge</option>
<option value="Magic">Magic</option>
<option value="Precision">Precision</option>
<option value="Power">Power</option>
<option value="Mind">Mind</option>
<option value="Reflex">Reflex</option>
<option value="Constitution">Constitution</option></select> <strong> + </strong><label>Direction:</label><select name="dir"><option>UP</option><option>DOWN</option></select> <strong> + </strong><label>Amount:</label><select name="amount"><option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option></select> <strong> + </strong><label>Uses:</label><select name="uses"><option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option></select></p></fieldset>
<fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset></form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>

<script>function calculate(){const f=document.getElementById('builder');let add=0,energy=0,lines=['Base shift 1 tier for 1 use (add +0, energy +0)'];const amount=Number(f.amount.value),uses=Number(f.uses.value);if(f.always.checked){add+=4;energy+=2;lines.unshift('Will always resolve (add +4, energy +2)');}if(amount>1){add+=(amount-1)*3;energy+=amount-1;lines.push('Additional shift tiers (add +'+((amount-1)*3)+', energy +'+(amount-1)+')');}if(uses>1){add+=(uses-1)*3;energy+=uses-1;lines.push('Additional uses (add +'+((uses-1)*3)+', energy +'+(uses-1)+')');}setText('resolve',f.always.checked?'Yes':'No');setText('build',add);setText('cast',energy);setText('formula','Shift '+f.trait.value+' '+f.dir.value+' by '+amount+' for '+uses+' use(s)');fillList('breakdown',lines);}document.getElementById('builder').addEventListener('input',calculate);document.getElementById('builder').addEventListener('change',calculate);calculate();</script>
</body>
</html>
