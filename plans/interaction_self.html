<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interaction Builder - Self</title>
</head>
<body>
  <h1>Interaction Builder - Self</h1>
  <p>Builder for Self interaction.</p>
<form id="builder"><fieldset><legend>Overview</legend><p><strong>Always Resolve:</strong> <output id="resolve">No</output> | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">0</output></p><p><strong>Final Interaction:</strong> <output id="formula">Self interaction on self</output></p></fieldset><fieldset><legend>Builder</legend><p><label><input type="checkbox" name="always" /> Will always resolve</label></p><p><strong>Type =</strong> Self + <strong>Target =</strong> Self + <strong>Counter =</strong> d8</p></fieldset><fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset></form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>
<script>function calculate(){const f=document.getElementById('builder');let add=0,energy=0,lines=['Base self interaction (add +0, energy +0)'];if(f.always.checked){add+=5;energy+=3;lines.unshift('Will always resolve (add +5, energy +3)');}setText('resolve',f.always.checked?'Yes':'No');setText('build',add);setText('cast',energy);setText('formula','Self interaction on self with counter d8');fillList('breakdown',lines);}document.getElementById('builder').addEventListener('change',calculate);calculate();</script>
</body>
</html>
