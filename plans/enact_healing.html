<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enact Healing Builder</title>
</head>
<body>
  <h1>Enact Healing Builder</h1>
  <p>Builder for healing.</p>

<form id="builder">
  <fieldset><legend>Overview</legend><p><strong>Always Resolve:</strong> <output id="resolve">No</output> | <strong>Build Cost:</strong> <output id="build">0</output> | <strong>Cast Cost:</strong> <output id="cast">0</output></p><p><strong>Final Heal Formula:</strong> <output id="formula">1d4</output></p></fieldset>
  <fieldset><legend>Builder</legend>
    <p><label><input type="checkbox" name="always" /> Will always resolve</label></p>
    <p><label>Main Source:</label><select name="source" id="source"><option value="d4">d4</option><option value="d6">d6</option><option value="d8">d8</option><option value="d10">d10</option><option value="d12">d12</option><option value="trait">Trait (1d10)</option><option value="other">Another roll result</option></select>
      <span id="trait-wrap" hidden><label>Trait:</label><select name="trait"><option value="Strength">Strength</option>
<option value="Dexterity">Dexterity</option>
<option value="Stealth">Stealth</option>
<option value="Perception">Perception</option>
<option value="Nature">Nature</option>
<option value="Crafting">Crafting</option>
<option value="People Skill">People Skill</option>
<option value="Performance">Performance</option>
<option value="Thievery">Thievery</option>
<option value="Knowledge">Knowledge</option>
<option value="Magic">Magic</option>
<option value="Precision">Precision</option>
<option value="Power">Power</option>
<option value="Mind">Mind</option>
<option value="Reflex">Reflex</option>
<option value="Constitution">Constitution</option></select></span><span id="other-wrap" hidden><label>Other Roll Text:</label><input name="other" type="text" /></span></p>
    <p><strong>Healing =</strong> <span id="preview">1d4</span> <strong> + </strong><label>Flat Bonus:</label><select name="flat"><option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
<option value="19">19</option>
<option value="20">20</option></select> <strong> + </strong><label>Medicine:</label><select name="medicine"><option value="">None</option><option value="Medicine">Medicine (1d10)</option></select></p>
  </fieldset>
  <fieldset><legend>Cost Breakdown</legend><ul id="breakdown"></ul></fieldset>
</form>
<script>
function setText(id, value) { const el = document.getElementById(id); if (el) el.textContent = value; }
function fillList(id, items) {
  const host = document.getElementById(id); if (!host) return;
  host.innerHTML = '';
  items.forEach(item => { const li = document.createElement('li'); li.textContent = item; host.appendChild(li); });
}
</script>

<script>
function calculate(){const f=document.getElementById('builder');let add=0,energy=0,formula='',preview='',lines=[];if(f.always.checked){add+=4;energy+=2;lines.push('Will always resolve (add +4, energy +2)');}const s=f.source.value;const shift={d4:0,d6:1,d8:2,d10:3,d12:4};if(shift[s]!==undefined){formula='1'+s;preview='1'+s;add+=shift[s]*2;energy+=shift[s];lines.push(s==='d4'?'Base healing die: 1d4 (add +0, energy +0)':'Shift heal up '+shift[s]+' tier(s) (add +'+(shift[s]*2)+', energy +'+shift[s]+')');}if(s==='trait'){formula='1d10';preview='1d10 ('+f.trait.value+')';add+=3;lines.push('Use trait for healing (add +3, energy +0)');}if(s==='other'){formula=f.other.value.trim()||'[other roll result]';preview=formula;add+=3;energy+=1;lines.push('Use another roll result (add +3, energy +1)');}const flat=Number(f.flat.value||0);if(flat>0){formula+=' + '+flat;add+=flat*2;lines.push('Flat bonus +'+flat+' (add +'+(flat*2)+', energy +0)');}if(f.medicine.value){formula+=' + 1d10';add+=3;energy+=1;lines.push('Add Medicine trait dice (add +3, energy +1)');}document.getElementById('trait-wrap').hidden=s!=='trait';document.getElementById('other-wrap').hidden=s!=='other';setText('resolve',f.always.checked?'Yes':'No');setText('build',add);setText('cast',energy);setText('formula',formula);setText('preview',preview);fillList('breakdown',lines);}
document.getElementById('builder').addEventListener('input',calculate);document.getElementById('builder').addEventListener('change',calculate);calculate();
</script>
</body>
</html>
