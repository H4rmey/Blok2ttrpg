{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blok2 TTRPG — {{template "title" .}}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-4 py-3 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex items-center gap-6">
            <a href="/" class="text-xl font-bold text-indigo-400 hover:text-indigo-300">Blok2 TTRPG</a>
            <a href="/" class="text-gray-300 hover:text-white text-sm">Characters</a>
            {{block "navbar_extra" .}}{{end}}
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-8">
        {{template "content" .}}
    </main>
    <footer class="text-center text-gray-500 text-sm py-8">
        Blok2 TTRPG Ability Builder
    </footer>

    <script>
    // ===== Character Sheet: Dynamic Trait Points =====
    var profCosts = {
        'Clumsy': -1,
        'Untrained': 0,
        'Trained': 1,
        'Expert': 2,
        'Master': 3,
        'Legendary': 4
    };

    function recalculateTraitPoints() {
        var total = 0;
        document.querySelectorAll('select[name^="general_"], select[name^="offense_"], select[name^="defense_"], select[name="vital_hp"], select[name="vital_movement"], select[name="vital_energy"]').forEach(function(sel) {
            var val = sel.value;
            if (profCosts[val] !== undefined) {
                total += profCosts[val];
            }
        });

        var usedEl = document.getElementById('trait-points-used');
        if (usedEl) usedEl.textContent = total;

        var levelInput = document.querySelector('input[name="level"]');
        var level = levelInput ? parseInt(levelInput.value) || 1 : 1;
        var budget = 10 + (level - 1);

        var budgetEl = document.getElementById('trait-points-budget');
        if (budgetEl) budgetEl.textContent = budget;

        var warningEl = document.getElementById('trait-points-warning');
        if (warningEl) {
            warningEl.style.display = total > budget ? 'inline' : 'none';
        }

        if (usedEl) {
            usedEl.className = total > budget
                ? 'text-2xl font-bold text-red-400'
                : 'text-2xl font-bold text-green-400';
        }
    }

    // Attach listeners on page load and after HTMX swaps
    document.addEventListener('DOMContentLoaded', function() {
        attachTraitListeners();
    });

    document.addEventListener('htmx:afterSwap', function() {
        attachTraitListeners();
    });

    function attachTraitListeners() {
        document.querySelectorAll('select[name^="general_"], select[name^="offense_"], select[name^="defense_"], select[name="vital_hp"], select[name="vital_movement"], select[name="vital_energy"]').forEach(function(sel) {
            sel.removeEventListener('change', recalculateTraitPoints);
            sel.addEventListener('change', recalculateTraitPoints);
        });

        var levelInput = document.querySelector('input[name="level"]');
        if (levelInput) {
            levelInput.removeEventListener('input', recalculateTraitPoints);
            levelInput.addEventListener('input', recalculateTraitPoints);
        }
    }
    </script>
</body>
</html>
{{end}}
